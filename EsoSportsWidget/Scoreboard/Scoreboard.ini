; FAVORITE SCHEDULES
; =====================
[FavSchedule1]
Measure=WebParser
URL=about:blank
RegExp=(?siU)^(.*)$
UpdateRate=(#RefreshMinutes# * 60)
FinishAction=[!CommandMeasure LuaFavorites "ParseFavSchedule(1)"]
DynamicVariables=1
Disabled=1

