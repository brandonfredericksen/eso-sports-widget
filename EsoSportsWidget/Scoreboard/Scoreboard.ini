[Rainmeter]
Update=1000
DynamicWindowSize=1
AccurateText=1
ContextTitle=Edit Settings
ContextAction=["#@#Variables.inc"]
ContextTitle2=Refresh Skin
ContextAction2=[!Refresh]
ContextTitle3=---
ContextTitle4=Eso Sports Widget
BackgroundMode=2
SolidColor=0,0,0,1
OnRefreshAction=[!CommandMeasure LuaFavorites "ResetFavorites()"]
MouseScrollUpAction=[!CommandMeasure LuaFavorites "ScrollUp()"]
